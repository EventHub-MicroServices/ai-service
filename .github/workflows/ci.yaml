name: ai service ci 

on: push

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    # outputs:
    #   quality_gate: ${{ steps.gate-check.outputs.quality-gate-status }}
    steps:
    - name: get code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  #complete history

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7.1.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: SonarQube Quality Gate check
      id: gate-check
      uses: sonarsource/sonarqube-quality-gate-action@master
      with:
        pollingTimeoutSec: 600
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Sending if fail
      if: steps.gate-check.outputs.quality-gate-status == 'PASSED'
      run: echo "Build running because QG PASSED"

      
  snyk-sca:
    permissions:
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Run Snyk to check for vulnerabilities
        id: snyk
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif --monitor
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: team3kubectl/ai-service:v1.1.2