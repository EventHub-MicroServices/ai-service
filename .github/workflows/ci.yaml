name: ai service ci 

on: push

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    # outputs:
    #   quality_gate: ${{ steps.gate-check.outputs.quality-gate-status }}
    steps:
    - name: get code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  #complete history

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7.1.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: SonarQube Quality Gate check
      id: gate-check
      uses: sonarsource/sonarqube-quality-gate-action@master
      with:
        pollingTimeoutSec: 600
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #  Optionally you can use the output from the Quality Gate in another step.
      # The possible outputs of the `quality-gate-status` variable are `PASSED`, `WARN` or `FAILED`.
      # - name: "Example show SonarQube Quality Gate Status value"
      #   run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"
    - name: Sending if fail
      if: steps.gate-check.outputs.quality-gate-status == 'PASSED'
      run: echo "Build running because QG PASSED"

      
  snyk-sca:
    permissions:
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Run Snyk to check for vulnerabilities
        id: snyk
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif --monitor
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

    docker-build:
      runs-on:  ubuntu-latest
      needs: [sonarqube,snyk_sca]
      if: needs.sonarqube.outputs.quality_gate == 'PASSED'
      

       
  
  
    
  
      

