name: ai service ci 

on: push
permissions:
  security-events: write

jobs:

  sonarqube:
    runs-on: ubuntu-latest
    outputs:
      quality_gate: ${{ steps.gate-check.outputs.quality-gate-status }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate Check
        id: gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Fail if Quality Gate fails
        if: steps.gate-check.outputs.quality-gate-status != 'PASSED'
        run: exit 1
      - name: Slack alert (Sonar fail)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ SonarQube Quality Gate Failed\nRepo: ${{ github.repository }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}


  snyk-sca:
    permissions:
      security-events: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        id: snyk
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif --severity-threshold=critical

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
      - name: Fail if critical vulnerabilities found
        if: steps.snyk.outcome == 'failure'
        run: exit 1
      - name: Slack alert (Snyk fail)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ Snyk Critical Vulnerabilities Found"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  docker:
    runs-on: ubuntu-latest
    needs: [sonarqube, snyk-sca]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🏗️ Build image locally
      - name: Build Docker image
        run: docker build -t iyask/ai-service:latest .

      # 📊 Trivy Table (for logs)
      - name: Trivy scan (table output)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: iyask/ai-service:latest
          format: table

      # 📄 Generate SARIF report (for GitHub Security tab)
      - name: Trivy scan (SARIF report)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: iyask/ai-service:latest
          format: sarif
          output: trivy-results.sarif

      # ⬆️ Upload SARIF to GitHub
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ❌ Fail ONLY on CRITICAL vulnerabilities
      - name: Fail on CRITICAL vulnerabilities
        id: trivy-critical
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: iyask/ai-service:latest
          severity: CRITICAL
          exit-code: 1

      # 🔔 Slack alert if scan fails
      - name: Slack alert (Image scan fail)
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Docker Image Scan Failed*\nCritical vulnerabilities detected"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Report"
                      },
                      "url": "https://github.com/${{ github.repository }}/security/code-scanning"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # 🔐 Login only if scan passed
      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🚀 Push only if safe
      - name: Push Docker image
        if: success()
        run: docker push iyask/ai-service:latest