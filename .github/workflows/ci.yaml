name: CI — Code Quality & Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  security-events: write
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: SonarQube SAST Scan
  # ─────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    outputs:
      quality_gate:    ${{ steps.gate-check.outputs.quality-gate-status }}
      bugs:            ${{ steps.sonar-metrics.outputs.bugs }}
      vulnerabilities: ${{ steps.sonar-metrics.outputs.vulnerabilities }}
      code_smells:     ${{ steps.sonar-metrics.outputs.code_smells }}
      coverage:        ${{ steps.sonar-metrics.outputs.coverage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Uncomment and add SONAR_HOST_URL secret when using a self-hosted server:
          # SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        id: gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Fetch SonarQube Metrics
        id: sonar-metrics
        if: always()
        run: |
          PROJECT_KEY=$(cat sonar-project.properties | grep "sonar.projectKey" | cut -d'=' -f2)
          # Replace sonarcloud.io with ${{ secrets.SONAR_HOST_URL }} for self-hosted.
          METRICS=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/measures/component?component=${PROJECT_KEY}&metricKeys=bugs,vulnerabilities,code_smells,coverage")
          echo "bugs=$(echo $METRICS | jq -r '.component.measures[] | select(.metric=="bugs") | .value')"                     >> $GITHUB_OUTPUT
          echo "vulnerabilities=$(echo $METRICS | jq -r '.component.measures[] | select(.metric=="vulnerabilities") | .value')" >> $GITHUB_OUTPUT
          echo "code_smells=$(echo $METRICS | jq -r '.component.measures[] | select(.metric=="code_smells") | .value')"        >> $GITHUB_OUTPUT
          echo "coverage=$(echo $METRICS | jq -r '.component.measures[] | select(.metric=="coverage") | .value')"              >> $GITHUB_OUTPUT

      - name: Fail if Quality Gate failed
        if: steps.gate-check.outputs.quality-gate-status != 'PASSED'
        run: exit 1

      - name: Notify — SonarQube failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          status:              "failed"
          pipeline:            "CI"
          job_name:            "sonarqube"
          sonar_bugs:          ${{ steps.sonar-metrics.outputs.bugs }}
          sonar_vulnerabilities: ${{ steps.sonar-metrics.outputs.vulnerabilities }}
          sonar_code_smells:   ${{ steps.sonar-metrics.outputs.code_smells }}
          sonar_coverage:      ${{ steps.sonar-metrics.outputs.coverage }}
          sonar_gate_status:   ${{ steps.gate-check.outputs.quality-gate-status }}
          slack_webhook_url:   ${{ secrets.SLACK_WEBHOOK_URL }}
          # ── Gmail (remove these two lines if you don't want email alerts) ──
          gmail_username:      ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password:  ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to:     ${{ secrets.NOTIFY_EMAIL_TO }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Snyk SCA Scan (runs in parallel with SonarQube)
  # ─────────────────────────────────────────────────────────────────────────────
  snyk-sca:
    name: Snyk
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    outputs:
      critical:  ${{ steps.snyk-counts.outputs.critical }}
      high:      ${{ steps.snyk-counts.outputs.high }}
      medium:    ${{ steps.snyk-counts.outputs.medium }}
      error_msg: ${{ steps.snyk-counts.outputs.error_msg }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk Scan
        id: snyk
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif --severity-threshold=critical --json-file-output=snyk.json

      - name: Parse Snyk vulnerability counts
        id: snyk-counts
        if: always()
        run: |
          if [ -f snyk.json ]; then
            CRITICAL=$(jq '[.vulnerabilities[] | select(.severity=="critical")] | length' snyk.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.vulnerabilities[] | select(.severity=="high")] | length' snyk.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.vulnerabilities[] | select(.severity=="medium")] | length' snyk.json 2>/dev/null || echo "0")
            ERROR_MSG=$(jq -r '.error // "Critical vulnerabilities found"' snyk.json 2>/dev/null || echo "Critical vulnerabilities found")
          else
            CRITICAL="N/A"; HIGH="N/A"; MEDIUM="N/A"; ERROR_MSG="snyk.json not generated"
          fi
          echo "critical=$CRITICAL"   >> $GITHUB_OUTPUT
          echo "high=$HIGH"           >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM"       >> $GITHUB_OUTPUT
          echo "error_msg=$ERROR_MSG" >> $GITHUB_OUTPUT

      - name: Upload Snyk SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Fail if critical vulnerabilities found
        if: steps.snyk.outcome == 'failure'
        run: exit 1

      - name: Notify — Snyk failure
        if: failure()
        uses: ./.github/actions/slack-notify
        with:
          status:             "failed"
          pipeline:           "CI"
          job_name:           "snyk-sca"
          snyk_critical:      ${{ steps.snyk-counts.outputs.critical }}
          snyk_high:          ${{ steps.snyk-counts.outputs.high }}
          snyk_medium:        ${{ steps.snyk-counts.outputs.medium }}
          error_message:      ${{ steps.snyk-counts.outputs.error_msg }}
          slack_webhook_url:  ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username:     ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to:    ${{ secrets.NOTIFY_EMAIL_TO }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Call Docker Pipeline Workflow
  # ─────────────────────────────────────────────────────────────────────────────
  trigger-docker-pipeline:
    name: Docker
    needs: [sonarqube, snyk-sca]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docker.yaml
    secrets: inherit