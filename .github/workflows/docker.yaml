name: Docker — Build, Scan & Push

on:
  workflow_run:
    workflows: ["CI — Code Quality & Security"]   # exact name from ci.yaml
    types: [completed]
    branches: [main, master]                       # only trigger on main branch

permissions:
  security-events: write
  contents: read

env:
  IMAGE_NAME: iyask/ai-service
  IMAGE_TAG:  ${{ github.sha }}                    # unique tag per commit

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: only proceed if CI workflow passed
  # ─────────────────────────────────────────────────────────────────────────────
  check-ci-status:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI passed — proceeding to Docker pipeline
        run: echo "CI passed. Starting Docker build pipeline."


  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build Docker Image
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: check-ci-status
    outputs:
      error_msg: ${{ steps.capture-error.outputs.error_msg }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
                       -t ${{ env.IMAGE_NAME }}:latest . 2>&1 | tee build.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Capture build error
        id: capture-error
        if: failure()
        run: |
          ERROR=$(tail -20 build.log | tr '\n' ' ')
          echo "error_msg=$ERROR" >> $GITHUB_OUTPUT

      # Save image as artifact so next jobs can use it
      - name: Save Docker image to tar
        if: success()
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload image artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # Notify Slack if build failed
  notify-build-fail:
    name: Notify — Build Failure
    needs: docker-build
    if: failure() && needs.docker-build.result == 'failure'
    uses: ./.github/workflows/notify.yaml
    with:
      status: "failed"
      pipeline: "Docker"
      job_name: "docker-build"
      docker_image: "iyask/ai-service"
      docker_tag: ${{ github.sha }}
      error_message: ${{ needs.docker-build.outputs.error_msg }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}


  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Trivy Image Scan
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build
    outputs:
      critical: ${{ steps.trivy-counts.outputs.critical }}
      high:     ${{ steps.trivy-counts.outputs.high }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      # Human-readable table scan (visible in logs)
      - name: Trivy scan — table output (logs)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table

      # SARIF report for GitHub Security tab
      - name: Trivy scan — SARIF report
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # JSON output for parsing counts
      - name: Trivy scan — JSON output
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: json
          output: trivy-results.json

      - name: Parse Trivy vulnerability counts
        id: trivy-counts
        if: always()
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json 2>/dev/null || echo "0")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH"         >> $GITHUB_OUTPUT

      # Fail pipeline if CRITICAL CVEs found
      - name: Fail on CRITICAL vulnerabilities
        id: trivy-critical
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL
          exit-code: 1

  # Notify Slack if Trivy scan failed
  notify-trivy-fail:
    name: Notify — Trivy Failure
    needs: [trivy-scan]
    if: failure() && needs.trivy-scan.result == 'failure'
    uses: ./.github/workflows/notify.yaml
    with:
      status: "failed"
      pipeline: "Docker"
      job_name: "trivy-scan"
      docker_image: "iyask/ai-service"
      docker_tag: ${{ github.sha }}
      trivy_critical: ${{ needs.trivy-scan.outputs.critical }}
      trivy_high:     ${{ needs.trivy-scan.outputs.high }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}


  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Push to Docker Hub
  # ─────────────────────────────────────────────────────────────────────────────
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: trivy-scan
    outputs:
      error_msg: ${{ steps.capture-push-error.outputs.error_msg }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image (commit SHA tag)
        id: push
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} 2>&1 | tee push.log

      - name: Push Docker image (latest tag)
        run: docker push ${{ env.IMAGE_NAME }}:latest

      - name: Capture push error
        id: capture-push-error
        if: failure()
        run: |
          ERROR=$(tail -10 push.log | tr '\n' ' ')
          echo "error_msg=$ERROR" >> $GITHUB_OUTPUT

  # Notify Slack if push failed
  notify-push-fail:
    name: Notify — Push Failure
    needs: docker-push
    if: failure() && needs.docker-push.result == 'failure'
    uses: ./.github/workflows/notify.yaml
    with:
      status: "failed"
      pipeline: "Docker"
      job_name: "docker-push"
      docker_image: "iyask/ai-service"
      docker_tag: ${{ github.sha }}
      error_message: ${{ needs.docker-push.outputs.error_msg }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}


  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: Success Notification (only if ALL jobs passed)
  # ─────────────────────────────────────────────────────────────────────────────
  notify-success:
    name: Notify — Pipeline Success
    # runs-on: ubuntu-latest
    needs: [docker-build, trivy-scan, docker-push]
    if: success()
    uses: ./.github/workflows/notify.yaml
    with:
      status: "success"
      pipeline: "Docker"
      job_name: "all"
      docker_image: "iyask/ai-service"
      docker_tag: ${{ github.sha }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}