name: Docker — Build, Scan & Push

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Image Tag (Format: v*.*.*, e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  security-events: write
  contents: read

env:
  IMAGE_NAME: iyask/ai-service

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Unified Docker Pipeline (Build → Trivy Scan → Push)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-pipeline:
    name: Docker Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Version Tag Format
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: '$TAG'. Must follow v*.*.* (e.g., v1.2.3)"
            exit 1
          fi
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🐳 [1] BUILD ────────────────────────────────────────────────────────────
      - name: Build Docker image
        id: build
        run: |
          set -o pipefail
          docker buildx build \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --load . 2>&1 | tee build.log

      - name: Capture build error
        id: capture-build-error
        if: failure() && steps.build.outcome == 'failure'
        run: |
          ERROR=$(tail -20 build.log | tr '\n' ' ')
          echo "error_msg=$ERROR" >> $GITHUB_OUTPUT

      - name: Notify — Docker build failure
        if: failure() && steps.build.outcome == 'failure'
        uses: ./.github/actions/slack-notify
        with:
          status:             "failed"
          pipeline:           "Docker"
          job_name:           "docker-build"
          docker_image:       ${{ env.IMAGE_NAME }}
          docker_tag:         ${{ env.IMAGE_TAG }}
          error_message:      ${{ steps.capture-build-error.outputs.error_msg }}
          slack_webhook_url:  ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username:     ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to:    ${{ secrets.NOTIFY_EMAIL_TO }}


      # 🛡️ [2] TRIVY SCAN ────────────────────────────────────────────────────────
      - name: Trivy scan — table output (logs)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table

      - name: Trivy scan — SARIF report
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy scan — JSON output
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: json
          output: trivy-results.json

      - name: Parse Trivy counts
        id: trivy-counts
        if: always()
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json 2>/dev/null || echo "0")
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json 2>/dev/null || echo "0")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH"         >> $GITHUB_OUTPUT

      - name: Fail on CRITICAL vulnerabilities
        id: trivy-critical
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL
          exit-code: 1

      - name: Notify — Trivy scan failure
        if: failure() && steps.trivy-critical.outcome == 'failure'
        uses: ./.github/actions/slack-notify
        with:
          status:             "failed"
          pipeline:           "Docker"
          job_name:           "trivy-scan"
          docker_image:       ${{ env.IMAGE_NAME }}
          docker_tag:         ${{ env.IMAGE_TAG }}
          trivy_critical:     ${{ steps.trivy-counts.outputs.critical }}
          trivy_high:         ${{ steps.trivy-counts.outputs.high }}
          slack_webhook_url:  ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username:     ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to:    ${{ secrets.NOTIFY_EMAIL_TO }}


      # 🚀 [3] PUSH ─────────────────────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        id: push
        run: |
          set -o pipefail
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} 2>&1 | tee push.log

      - name: Capture push error
        id: capture-push-error
        if: failure() && steps.push.outcome == 'failure'
        run: |
          ERROR=$(tail -10 push.log | tr '\n' ' ')
          echo "error_msg=$ERROR" >> $GITHUB_OUTPUT

      - name: Notify — Docker push failure
        if: failure() && steps.push.outcome == 'failure'
        uses: ./.github/actions/slack-notify
        with:
          status:             "failed"
          pipeline:           "Docker"
          job_name:           "docker-push"
          docker_image:       ${{ env.IMAGE_NAME }}
          docker_tag:         ${{ env.IMAGE_TAG }}
          error_message:      ${{ steps.capture-push-error.outputs.error_msg }}
          slack_webhook_url:  ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username:     ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to:    ${{ secrets.NOTIFY_EMAIL_TO }}


      # ✅ [4] SUCCESS ───────────────────────────────────────────────────────────
      - name: Notify — full pipeline success
        if: success()
        uses: ./.github/actions/slack-notify
        with:
          status:             "success"
          pipeline:           "Docker"
          job_name:           "all"
          docker_image:       ${{ env.IMAGE_NAME }}
          docker_tag:         ${{ env.IMAGE_TAG }}
          slack_webhook_url:  ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username:     ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to:    ${{ secrets.NOTIFY_EMAIL_TO }}